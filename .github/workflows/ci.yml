name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install just
        uses: extractions/setup-just@v2

      # The Justfile is the Single Source Of Truth (SSOT) for all pre-commit checks.
      # No additional linting or testing logic should be added here.
      - name: Run pre-commit checks
        run: just precommit
